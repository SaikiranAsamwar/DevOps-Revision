version: '3'
services:
  frontend:
    image: nginx:latest
    container_name: frontend
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - backend
  
  backend:
    build: ./backend
    container_name: backend
    environment:
      MONGO_URI: mongodb://mongo:27017/mydb
    depends_on: 
      - mongo

  mongo:
    image: mongo:latest
    container_name: mongo
    volumes:
      - mongo-data:/data/db

volumes:
    mongo-data:
